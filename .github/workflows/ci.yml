# CI — Build all plugin formats and run unit tests on macOS + Windows.
# Triggered on PRs targeting develop or main, and pushes to main.
# Develop pushes are handled by publish-develop.yml (which also runs tests).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: RVRSE
  TEST_TARGET: rvrse_tests

jobs:
  # ---------------------------------------------------------------------------
  # Version consistency check
  # ---------------------------------------------------------------------------
  version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version sync
        run: python3 scripts/sync-version.py --check

  # ---------------------------------------------------------------------------
  # macOS — Ninja, NanoVG/Metal
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-14 # Apple Silicon runner
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Ninja
        run: brew install ninja

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (Ninja)
        run: cmake --preset macos-ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build plugins
        run: cmake --build build/macos-ninja --config Debug

      - name: Build tests
        run: cmake --build build/macos-ninja --config Debug --target ${{ env.TEST_TARGET }}

      - name: Run tests
        run: ctest --test-dir build/macos-ninja --output-on-failure

      - name: Download pluginval (pinned v1.0.4)
        run: |
          curl -fsSL "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip" -o pluginval.zip
          echo "3c4c533bda0c5059eea3ddaea752d757ee2025041f0f47e6bcb0e87f6082b29f  pluginval.zip" | shasum -a 256 --check
          unzip -q pluginval.zip

      - name: Validate VST3 (pluginval)
        run: pluginval.app/Contents/MacOS/pluginval --validate-in-process --strictness-level 5 --skip-gui-tests --output-dir ./pluginval-logs "build/macos-ninja/out/${{ env.PROJECT_NAME }}.vst3"

      - name: Validate AU (pluginval)
        run: |
          # AU plugins must be registered in a system location for pluginval to find them.
          # The SYMLINK deploy method may have created a symlink here already — remove it
          # and do a real copy so pluginval gets an actual bundle.
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/${{ env.PROJECT_NAME }}.component
          cp -R -L build/macos-ninja/out/${{ env.PROJECT_NAME }}.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          pluginval.app/Contents/MacOS/pluginval --validate-in-process --strictness-level 5 --skip-gui-tests --output-dir ./pluginval-logs ~/Library/Audio/Plug-Ins/Components/${{ env.PROJECT_NAME }}.component

      - name: Upload pluginval logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PROJECT_NAME }}-macOS-pluginval-logs
          path: pluginval-logs/**
          retention-days: 14

      - name: Upload artefacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PROJECT_NAME }}-macOS
          path: |
            build/macos-ninja/out/*.vst3
            build/macos-ninja/out/*.component
            build/macos-ninja/out/*.clap
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Windows — Visual Studio 2022, NanoVG/GL2
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        shell: bash
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (VS2022)
        run: cmake --preset windows-vs2022

      - name: Build plugins
        run: cmake --build build/windows-vs2022 --config Debug

      - name: Build tests
        run: cmake --build build/windows-vs2022 --config Debug --target ${{ env.TEST_TARGET }}

      - name: Run tests
        run: ctest --test-dir build/windows-vs2022 -C Debug --output-on-failure

      - name: Download pluginval (pinned v1.0.4)
        run: |
          Invoke-WebRequest "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip" -OutFile pluginval.zip
          $hash = (Get-FileHash pluginval.zip -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne "c08e61ce3b96db41636f8ec7e76f4c7e2c13ebdac7fa1b5a1f52b4f32ec715ab") { throw "pluginval SHA256 mismatch: $hash" }
          Expand-Archive pluginval.zip -DestinationPath .

      - name: Validate VST3 (pluginval)
        run: ./pluginval.exe --validate-in-process --strictness-level 5 --skip-gui-tests --output-dir ./pluginval-logs "build/windows-vs2022/out/${{ env.PROJECT_NAME }}.vst3"

      - name: Upload pluginval logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PROJECT_NAME }}-Windows-pluginval-logs
          path: pluginval-logs/**
          retention-days: 14

      - name: Upload artefacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PROJECT_NAME }}-Windows
          path: |
            build/windows-vs2022/out/*.vst3
          retention-days: 14
